# @package _global_
# E2E smoke test: tiny Qwen3.5-MoE + SGLang rollout with tp_size=2.
# One rollout → train step → reward, to validate the full colocate TP loop.
#
# Run (2 GPUs):
#   DATA_PATH=/tmp/tiny_qwen3moe_data/train.jsonl \
#   EVAL_DATA_PATH=/tmp/tiny_qwen3moe_data/eval.jsonl \
#   QWEN3_PATH=/tmp/tiny-qwen35-moe \
#   python -m unirl.train_ar --config-name=ar/qwen3_moe_tiny_sglang_tp2 num_devices=2 +devices_per_node=2

num_devices: 2
batch_size: 4
num_rollouts: 1
weight_sync_interval: 1
eval_interval: 0

adv_normalization_scope: global
normalize_adv_by_std: false

logging:
  report_to_wandb: false
  project_name: unirl-tp-smoke
  run_name: tiny_qwen3moe_tp2_smoke

bundle:
  _target_: unirl.models.qwen3.bundle.Qwen3Bundle.from_config
  config:
    _target_: unirl.models.qwen3.config.Qwen3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN3_PATH,/tmp/tiny-qwen35-moe}
    model_precision: bf16
    use_gradient_checkpointing: false

pipeline:
  _target_: unirl.models.qwen3.pipeline.Qwen3Pipeline.from_bundle
  enable_thinking: false
  autocast_precision: bf16
  logprob_precision: fp32

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["Qwen3_5MoeDecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: false
    use_torch_compile: false
    forward_prefetch: false
    defer_grad_sync: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 1.0e-6
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 1

rollout:
  _target_: unirl.rollout.engine.sglang.engine.SGLangRolloutEngine
  config:
    _target_: unirl.rollout.engine.sglang.config.SGLangEngineConfig
    backend: native
    pretrained_model_ckpt_path: ${oc.env:QWEN3_PATH,/tmp/tiny-qwen35-moe}
    tp_size: 2
    max_new_tokens: 64
    temperature: 1.0
    top_p: 1.0
    top_k: 0
    concurrency: 4
    samples_pre_expanded: true
    chat_template_kwargs:
      enable_thinking: false
    engine_kwargs:
      mem_fraction_static: 0.3
      skip_server_warmup: true
      attention_backend: triton
      disable_cuda_graph: true
      cuda_graph_max_bs: 4
      enable_lora: false

reward:
  _target_: unirl.reward.service.RewardService
  truncated_reward: keep
  backend:
    _target_: unirl.reward.local.mathverify.MathVerifyRewardScorer
    base_device: cpu
    config:
      _target_: unirl.reward.local.mathverify.MathVerifySpec

algorithm:
  _target_: unirl.algorithms.grpo.GRPO
  stage_attr: ar
  clip_range: 0.2
  clip_range_high: 0.28
  clip_schedule: constant
  loss_agg_mode: seq-mean-token-mean
  horizon: 64
  sampling_temperature: 1.0
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen3.conditions.Qwen3ARConditions

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 1

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: 42
    algorithm:
      prompts_per_rollout: 4

sampling:
  _target_: unirl.types.sampling.ARSamplingParams
  samples_per_prompt: 2
  temperature: 1.0
  top_p: 1.0
  top_k: 0
  max_new_tokens: 64

sync:
  _target_: unirl.distributed.weight_sync.full.tensor.TensorWeightSync
  lora_merged: false
  bucket_size_mb: 64
  flush_cache: true
