# @package _global_
# AR GRPO Qwen3.5-MoE VL on Geometry3K-MC — train_ar (ARTrainer),
# SGLang rollout, full-weight TensorWeightSync, colocate.
#
# MoE + VL combined: Qwen3_5MoeDecoderLayer blocks + image_token="<|image_pad|>".
#
# Smoke default uses tiny-random/qwen3.5-moe (<10MB) for 1-GPU e2e. Override
# QWEN3_5_MOE_PATH for real training.
#
# Smoke (1 GPU, 1 rollout, tiny model):
#   python -m unirl.train_ar --config-name=ar/qwen3_5_moe_grpo_vl_sglang num_devices=1 num_rollouts=1
#
# Real run (32 GPU):
#   DATA_PATH=data/geo3k_mc/train.jsonl EVAL_DATA_PATH=data/geo3k_mc/val.jsonl \
#   QWEN3_5_MOE_PATH=/path/to/Qwen3.5-35B-A3B \
#   python -m unirl.train_ar --config-name=ar/qwen3_5_moe_grpo_vl_sglang num_devices=32

num_devices: 32
batch_size: 32
num_rollouts: 2000
weight_sync_interval: 1

adv_normalization_scope: global

logging:
  report_to_wandb: true
  project_name: unirl-grpo
  run_name: grpo_qwen3_5_moe_vl_geo3k_mc_sglang
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [grpo, qwen3_5, moe, vl, geo3k-mc, sglang]

bundle:
  _target_: unirl.models.qwen3_5.bundle.Qwen3_5Bundle.from_config
  config:
    _target_: unirl.models.qwen3_5.config.Qwen3_5PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN3_5_MOE_PATH,tiny-random/qwen3.5-moe}
    model_precision: bf16
    freeze_vision_tower: true
    use_gradient_checkpointing: true
    max_prompt_length: 2048
    attn_implementation: null
    trust_remote_code: false

pipeline:
  _target_: unirl.models.qwen3_5.pipeline.Qwen3_5Pipeline.from_bundle
  max_prompt_length: 2048
  enable_thinking: false
  autocast_precision: bf16
  logprob_precision: fp32

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["Qwen3_5MoeDecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: false
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 5.0e-6
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 2000

rollout:
  _target_: unirl.rollout.engine.sglang.engine.SGLangRolloutEngine
  config:
    _target_: unirl.rollout.engine.sglang.config.SGLangEngineConfig
    backend: native
    pretrained_model_ckpt_path: ${oc.env:QWEN3_5_MOE_PATH,tiny-random/qwen3.5-moe}
    tp_size: 8
    samples_pre_expanded: true
    image_token: "<|image_pad|>"
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    concurrency: 8
    engine_kwargs:
      mem_fraction_static: 0.25
      skip_server_warmup: true
      disable_cuda_graph: true
      enable_lora: false

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.mc_exact_match.MCExactMatchRewardScorer
    base_device: cpu
    config:
      _target_: unirl.reward.local.mc_exact_match.MCExactMatchSpec

algorithm:
  _target_: unirl.algorithms.grpo.GRPO
  stage_attr: ar
  clip_range: 1.0e-2
  clip_schedule: constant
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen3_5.conditions.Qwen3_5ARConditions
  sampling_temperature: 0.7

sync:
  _target_: unirl.distributed.weight_sync.full.tensor.TensorWeightSync
  lora_merged: false
  bucket_size_mb: 64
  flush_cache: true
  name_remap: {"model.visual.*": null, "model.language_model.*": "model.*"}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 2
  max_grad_norm: 1.0

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: 42
    algorithm:
      prompts_per_rollout: 32

sampling:
  _target_: unirl.types.sampling.ARSamplingParams
  samples_per_prompt: 16
  temperature: 0.7
  top_p: 0.9
  top_k: 1024
  max_new_tokens: 512
