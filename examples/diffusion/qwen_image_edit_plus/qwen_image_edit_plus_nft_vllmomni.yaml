# @package _global_
# Qwen-Image-Edit-Plus + DiffusionNFT — vLLM-Omni colocate variant, v2 trainer.
#
# Same algorithm/bundle/sampling/conditions_cls as qwen_image_edit_plus_nft.yaml
# (the trainside recipe, which doubles as the parity oracle), but the rollout
# runs on a vLLM-Omni v2 engine (separate sampler, LoRA weight-synced into the
# engine each rollout) instead of the in-process trainsite engine. Mirrors how
# qwen_image_grpo_vllmomni.yaml relates to its trainside twin.
#
# Engine deltas vs the trainside recipe — rollout block + sync block +
# weight_sync_interval + load_text_encoder=false + tags only; everything else
# is byte-identical so a fixed-seed run compares cleanly against trainsite.
#
# Image-edit path (vs qwen_image_grpo_vllmomni.yaml):
#   - bundle/pipeline → QwenImageEditPlus* (in_channels=64, source-image
#     latent token-concat inside predict_noise).
#   - rollout.modality → qwen_image_edit_plus_t2i (NEW; accepts image
#     primitive, injects PIL into prompt["multi_modal_data"]["image"], lets
#     upstream's get_qwen_image_edit_plus_pre_process_func do condition/vae
#     image preprocessing).
#   - data_source → datasets/image_edit (JSONL with prompt + condition image).
#   - The RL pipeline subclass (RLQwenImageEditPlusPipeline) captures the
#     upstream-computed image_latents (packed [B, S_img, C*4]) and ships them
#     as ImageLatentCondition in the rollout conditions, so the trainer-side
#     replay (predict_noise_at_step) can reconstruct the concat input.

num_devices: 8
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true      # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000
weight_sync_interval: 1       # LoRA sync cadence: every N rollouts push adapter into the engine

bundle:
  _target_: unirl.models.qwen_image_edit_plus.bundle.QwenImageEditPlusBundle.from_config
  config:
    _target_: unirl.models.qwen_image_edit_plus.config.QwenImageEditPlusPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN_IMAGE_EDIT_PLUS_PATH,/efs/linyongpan/code/models/Qwen/Qwen-Image-Edit-2511-merged_v9.7}
    model_precision: bf16
    max_sequence_length: 512
    # Trainer-side TE is dead weight on the separate-engine path (the
    # engine encodes; the trainer replays captured conditions) and its
    # ~15 GiB/rank starves the colocated engine boot (LIN-382 OOM).
    load_text_encoder: false
    # Static-shift fallback; the real checkpoint enables dynamic shifting via
    # scheduler/scheduler_config.json and this value is ignored at runtime.
    shift: 3.0

pipeline:
  _target_: unirl.models.qwen_image_edit_plus.pipeline.QwenImageEditPlusPipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["QwenImageTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    # Qwen-Image transformer + Qwen2.5-VL text encoder together exceed 96GB
    # per H20 under full-graph replay without AC; v1 uses bf16_full_ac.
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  # DiffusionNFT dual-adapter EMA (replaces the GRPO recipe's lora_cfg). Fields mirror
  # the v1 training.ema_lora block. target_modules keep the v1 DiffusionNFT set: bare
  # (un-prefixed) names that also cover the img/txt MLP projections — broader
  # than the GRPO recipe's attn-only `attn.*` set. Verified verbatim against
  # transformer/model.safetensors.index.json (Qwen-Image-Edit-2511-merged_v9.7).
  ema_lora_cfg:
    _target_: unirl.train.configs.EmaLoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    shadow_adapter: old
    ema_decay: 0.001
    ema_decay_type: warmup
    ema_flat_steps: 0
    ema_uprate: 0.001
    ema_uphold: 0.5
    timing: rollout_end
    target_modules:
      - to_q
      - to_k
      - to_v
      - to_out.0
      - add_q_proj
      - add_k_proj
      - add_v_proj
      - to_add_out
      - img_mlp.net.0.proj
      - img_mlp.net.2
      - txt_mlp.net.0.proj
      - txt_mlp.net.2

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    model_path: ${oc.env:QWEN_IMAGE_EDIT_PLUS_PATH,/efs/linyongpan/code/models/Qwen/Qwen-Image-Edit-2511-merged_v9.7}
    # Edit-Plus image-edit modality (NEW; accepts req.primitives['image'],
    # injects PIL into prompt['multi_modal_data']['image'] for upstream's
    # get_qwen_image_edit_plus_pre_process_func).
    modality: qwen_image_edit_plus_t2i
    # Required for colocate: trainer calls sleep()/wake_up() around the
    # train phase, which is a no-op unless CuMemAllocator is enabled at
    # vLLM-Omni init time (this knob flips enable_sleep_mode: True into
    # each stage's engine_args).
    enable_sleep_mode: true

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.diffusionnft.DiffusionNFT
  stage_attr: diffusion
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen_image_edit_plus.conditions.QwenImageEditPlusConditions
  params: ${sampling}
  # DiffusionNFT loss hyperparameters (v1 algorithm.algorithms.diffusion block).
  beta: 1.0
  adv_clip_max: 5.0
  adv_mode: raw
  use_adaptive_weight: true
  train_timestep_mode: all
  shuffle_train_timesteps: true
  apply_time_shift_in_loss: false
  training_timestep_fraction: 0.99
  kl_coef: 0.0

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH,datasets/image_edit/train.jsonl}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,datasets/image_edit/test.jsonl}
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 12       # qwen_384 preset default
  guidance_scale: 1.0
  height: 384
  width: 384
  eta: 0.0                      # DiffusionNFT: forward-process, no SDE noise injection
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 0            # DiffusionNFT forward-process: no SDE steps recorded

# LoRA weight sync → vLLM-Omni rollout. Instantiated as a LocalLoraWeightSync
# (sibling of backend + rollout) from this block's `_target_`, exactly like the
# blocks above. The train loop drives cadence via `weight_sync_interval` (top of
# file): every N rollouts it calls sync() to push the freshly-trained LoRA
# (set_lora_from_tensors) into the engine just before that rollout's generate —
# fused into the generate wake/sleep, so a synced step costs one wake+sleep,
# not two.
sync:
  _target_: unirl.distributed.weight_sync.lora.LocalLoraWeightSync
  verify: true
  # Mirrors QwenImageEditPlusPipelineConfig.weight_sync_param_name_prefix; must
  # match the engine-side LoRA key naming (a wrong prefix yields wrong/zero
  # loaded layers, which `verify` catches).
  param_prefix: "transformer."
  adapter_name: default

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-diffusionNFT}
  run_name: ${oc.env:WANDB_RUN_NAME,qwen_image_edit_plus_nft_vllmomni}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["qwen-image-edit-plus", "image-edit", "nft", "vllm-omni", "v2"]
  log_media: true
  media_max_items: 8
  media_log_interval: 1
