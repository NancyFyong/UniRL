# @package _global_
# Qwen-Image-Edit-Plus + DiffusionNFT — vLLM-Omni SEPARATE layout (4 train / 4 rollout).
#
# Derived from qwen_image_edit_plus_nft_vllmomni.yaml (colocate). Deltas:
#   - layout: separate + train_fraction: 0.5  -> 4 GPUs train (FSDP), 4 GPUs rollout
#   - sync._target_: RemoteLoraWeightSync    -> cross-slab Ray RPC push (Local is colocate-only)
#   - enable_sleep_mode: true (kept)          -> DiffusionTrainer.train_step calls sleep()/wake_up()
#                                                unconditionally; disabling would raise. In separate
#                                                mode sleep/wake is semantically wasted (no memory
#                                                contention) but harmless (CuMemAllocator pool cycle
#                                                on the 4 rollout GPUs only).
#
# Rollout DP goes 8 -> 4 (4 engine replicas). batch_size * samples_per_prompt = 768,
# 768 % 4 == 0 for both train slab and rollout slab (DP_SCATTER divisibility OK).

num_devices: 8
layout: separate              # 4 train GPUs + 4 rollout GPUs
train_fraction: 0.5           # 0.5 * 8 = 4 train, 4 rollout
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true
num_rollouts: 10000
weight_sync_interval: 1

bundle:
  _target_: unirl.models.qwen_image_edit_plus.bundle.QwenImageEditPlusBundle.from_config
  config:
    _target_: unirl.models.qwen_image_edit_plus.config.QwenImageEditPlusPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:QWEN_IMAGE_EDIT_PLUS_PATH,Qwen/Qwen-Image-Edit-2511}
    model_precision: bf16
    max_sequence_length: 512
    load_text_encoder: false
    shift: 3.0

pipeline:
  _target_: unirl.models.qwen_image_edit_plus.pipeline.QwenImageEditPlusPipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["QwenImageTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  ema_lora_cfg:
    _target_: unirl.train.configs.EmaLoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    shadow_adapter: old
    ema_decay: 0.001
    ema_decay_type: warmup
    ema_flat_steps: 0
    ema_uprate: 0.001
    ema_uphold: 0.5
    timing: rollout_end
    target_modules:
      - to_q
      - to_k
      - to_v
      - to_out.0
      - add_q_proj
      - add_k_proj
      - add_v_proj
      - to_add_out
      - img_mlp.net.0.proj
      - img_mlp.net.2
      - txt_mlp.net.0.proj
      - txt_mlp.net.2

rollout:
  _target_: unirl.rollout.engine.vllm_omni.engine.VLLMOmniRolloutEngine
  model_config: ${bundle.config}
  config:
    _target_: unirl.rollout.engine.vllm_omni.config.VLLMOmniEngineConfig
    model_path: ${oc.env:QWEN_IMAGE_EDIT_PLUS_PATH,Qwen/Qwen-Image-Edit-2511}
    modality: qwen_image_edit_plus_t2i
    # Separate slabs do not time-share GPUs, so sleep/wake is unnecessary.
    # With false, CuMemAllocator pool is never activated, so sleep()/wake_up()
    # become harmless no-ops (empty pointer_to_data dict). This avoids the
    # DiffusionWorker-dies-after-sleep bug. Matches SD3/HV1.5 separate pattern.
    enable_sleep_mode: false

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.pickscore.PickScoreRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.pickscore.PickScoreSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1

algorithm:
  _target_: unirl.algorithms.diffusionnft.DiffusionNFT
  stage_attr: diffusion
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.qwen_image_edit_plus.conditions.QwenImageEditPlusConditions
  params: ${sampling}
  beta: 1.0
  adv_clip_max: 5.0
  adv_mode: raw
  use_adaptive_weight: true
  train_timestep_mode: all
  shuffle_train_timesteps: true
  apply_time_shift_in_loss: false
  training_timestep_fraction: 0.99
  kl_coef: 0.0

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH,datasets/image_edit/train.jsonl}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,datasets/image_edit/test.jsonl}
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 12
  guidance_scale: 1.0
  height: 384
  width: 384
  eta: 0.0
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 0

# Cross-slab LoRA weight sync (separate layout: engine lives on a different Worker
# than the FSDP backend, so the colocate LocalLoraWeightSync cannot reach it).
# RemoteLoraWeightSync does a rank-0 Ray RPC push to the 4 rollout Workers.
# adapter_name omitted -> defaults to backend.rollout_adapter_name = "old" (NFT EMA shadow).
sync:
  _target_: unirl.distributed.weight_sync.lora.remote.RemoteLoraWeightSync
  verify: true
  param_prefix: "transformer."

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-diffusionNFT}
  run_name: ${oc.env:WANDB_RUN_NAME,qwen_image_edit_plus_nft_vllmomni_separate}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["qwen-image-edit-plus", "image-edit", "nft", "vllm-omni", "separate"]
  log_media: true
  media_max_items: 8
  media_log_interval: 1
