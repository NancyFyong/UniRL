# @package _global_
# DanceGRPO-Fast SD3.5 trainside (FSDP) colocate, v2 trainer, 2x8 — HPSv3++ reward.
#
# Identical to sd3_dancegrpo.yaml except the reward backend: the local PickScore
# scorer is replaced by HPSv3++ (capability- + RL-iteration-aware, Qwen3-VL-8B +
# FiLM + RankNet). HPSv3++ runs from the source repo (no PyPI package), so set:
#   HPSV3PP_REPO=/abs/path/to/HPSv3-PlusPlus   # git clone PlantPotatoOnMoon/HPSv3-PlusPlus + pip install -r requirements.txt
#   HPSV3PP_CKPT=/abs/path/to/hpsv3++.pth      # optional; empty auto-downloads Junjun2333/HPSv3-PlusPlus
# e.g. HPSV3PP_REPO=... +experiment=sd3/sd3_dancegrpo_hpsv3pp
#
# NOTE: HPSv3++ is an 8B (~16 GB bf16) reward model. Colocated, each DP rank
# loads its own copy on top of SD3.5 training — needs headroom (80 GB GPUs).
# For tight memory, host it out-of-process via RewardService (see
# sd3_nft_reward_service.yaml) instead of the local backend below.

num_devices: 16               # 2 nodes x 8 GPUs (v1 actor_count 16)
batch_size: 48                # prompts_per_rollout
adv_use_global_std: true     # advantage: divide by ONE batch-wide std (v1 parity), not per-group
num_rollouts: 10000

bundle:
  _target_: unirl.models.sd3.bundle.SD3Bundle.from_config
  config:
    _target_: unirl.models.sd3.config.SD3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,stabilityai/stable-diffusion-3.5-medium}
    model_precision: bf16
    shift: 3.0

pipeline:
  _target_: unirl.models.sd3.pipeline.SD3Pipeline
  shift: 3.0
  autocast_precision: bf16
  trajectory_precision: bf16
  logprob_precision: fp32
  # DanceGRPO: Dance SDE kernel (the one algorithmic difference from FlowGRPO).
  strategy:
    _target_: unirl.sde.kernels.DanceSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["JointTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: false  # SD3.5-medium is small (~5 GB bf16 full); keep params gathered, skip bwd re-gather
    activation_checkpointing: false  # v1 base flowgrpo_fast_sd3_trainside = bf16_full_noac
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 32
    alpha: 64
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - attn.to_k
      - attn.to_out.0
      - attn.to_q
      - attn.to_v

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 8            # v1 flowgrpo_fast_sd3_trainside

reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.hpsv3pp.HPSv3PPRewardScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.hpsv3pp.HPSv3PPSpec
      batch_size: 8
      device: auto
      # HPSv3-PlusPlus source checkout (prepended to sys.path so its `hpsv3` wins).
      repo_path: ${oc.env:HPSV3PP_REPO,""}
      # film_hybrid YAML; empty -> <repo_path>/hpsv3/config/train_stage2.yaml
      config_path: ${oc.env:HPSV3PP_CONFIG,""}
      # empty -> auto-download Junjun2333/HPSv3-PlusPlus/hpsv3++.pth
      checkpoint_path: ${oc.env:HPSV3PP_CKPT,""}
      # RL-iteration condition in [0, 1]; 0.0 = pre-RL preference scoring. The
      # paper ramps 0.3 -> 1.0 over RL training (per-step ramp needs step plumbing).
      rl_iteration: 0.0
      # score_scale is a divisor on the raw mu (reward = mu / score_scale).
      # GRPO normalizes advantages by (reward - mean)/std, so the scale cancels
      # and training is invariant to this value — 1.0 keeps the raw HPSv3++ mu
      # (~7-11), which is directly comparable to the scores reported in the
      # paper / HPSv3 benchmark. Set it only to rescale what wandb logs.
      score_scale: 1.0

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.sd3.conditions.SD3Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 8
  max_grad_norm: 1.0
  num_updates_per_batch: 2      # PPO mini-batches per rollout (π_old frozen once); v1 parity

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/pickscore/train.txt
      eval_data_path: datasets/pickscore/test.txt
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 10
  guidance_scale: 1.0
  height: 512
  width: 512
  eta: 0.7
  samples_per_prompt: 16
  seed: 42
  init_same_noise: false
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.5]   # SDE steps drawn from the first half (v1)
    num_sde_steps: 3

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-dancegrpo}
  run_name: ${oc.env:WANDB_RUN_NAME,sd3_dancegrpo_hpsv3pp}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["sd3.5", "dancegrpo", "grpo", "trainside", "v2", "hpsv3pp"]
  log_media: true
  media_max_items: 8
  media_log_interval: 1
