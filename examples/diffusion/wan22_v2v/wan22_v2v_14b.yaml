# @package _global_
# GRPO WAN 2.2 V2V (video-to-video) 14B trainside (FSDP) colocate.
#
# DATA_PATH must be a JSON/JSONL manifest whose rows carry a condition video:
# {"prompt": "...", "media": [{"modality": "video", "role": "condition", "uri": "/path/clip.mp4"}]}

num_devices: 8
# OOM-safe sanity geometry: 16 condition clips (LOVEU-TGVE DAVIS style subset) per
# rollout, group size 8 for GRPO advantages -> 128 samples / 32 GPUs = 4 per GPU.
batch_size: 16
adv_use_global_std: true
num_rollouts: 1000

bundle:
  _target_: unirl.models.wan22.bundle.WAN22Bundle.from_config
  config:
    _target_: unirl.models.wan22_v2v.config.WAN22V2VPipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,/apdcephfs_fsgm3/share_305110755/hunyuan/public_models/Wan2.2-T2V-A14B-Diffusers}
    model_precision: bf16
    vae_dtype: fp32
    autocast_precision: bf16
    trajectory_precision: fp16
    logprob_precision: fp32
    shift: 5.0
    max_sequence_length: 512
    boundary_ratio: 0.875
    num_train_timesteps: 1000
    strength: 0.8

pipeline:
  _target_: unirl.models.wan22_v2v.pipeline.WAN22V2VPipeline
  shift: 5.0
  strength: 0.8
  autocast_precision: bf16
  trajectory_precision: fp16
  logprob_precision: fp32
  max_sequence_length: 512
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["WanTransformerBlock"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    # Primary OOM fix: recompute each WanTransformerBlock in backward instead of
    # holding every block's activations for all replayed SDE steps at once.
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 1000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 64
    alpha: 128
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - attn1.to_q
      - attn1.to_k
      - attn1.to_v
      - attn1.to_out.0
      - attn2.to_q
      - attn2.to_k
      - attn2.to_v
      - attn2.to_out.0

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 1

reward:
  # Edit-delta reward: PickScore-to-target minus CLIP-similarity-to-source, so an
  # un-edited V2V output (already high on plain PickScore) nets ~0 and reward only
  # rises as the model applies the style edit. lambda_source weights "how much to
  # change from the source"; raise it to push stronger edits.
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.local.video_clip_delta.VideoCLIPDeltaScorer
    base_device: cuda
    config:
      _target_: unirl.reward.local.video_clip_delta.VideoCLIPDeltaSpec
      batch_size: 8
      device: auto
      processor_id: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_id: yuvalkirstain/PickScore_v1
      # text-vs-source terms share the PickScore scale, so lambda_source is a
      # scale-invariant weight; 0.25 keeps target-alignment dominant. source_sim_floor
      # caps the "diverge from source" reward to curb reward-hacking/instability.
      lambda_source: 0.25
      source_sim_floor: 0.3

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.wan21.conditions.WAN21Conditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 2

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: ${oc.env:DATA_PATH}
      eval_data_path: ${oc.env:EVAL_DATA_PATH,${oc.env:DATA_PATH}}
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  # OOM-safe sanity geometry. DAVIS source frames are square 480x480, so generate
  # square; fewer steps + smaller group keep the replay graph within 80GB and make
  # the loop fast enough to see PickScore rise within 1-2h. Scale up once stable.
  num_inference_steps: 16
  guidance_scale: 1.0
  height: 480
  width: 480
  num_frames: 9
  strength: 0.8
  eta: 0.7
  samples_per_prompt: 8
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: fp16
  logprob_precision: fp32
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    timestep_fraction: [0.0, 0.2]
    num_sde_steps: null

logging:
  report_to_wandb: ${oc.decode:${oc.env:REPORT_TO_WANDB,true}}
  project_name: ${oc.env:WANDB_PROJECT,unirl-grpo-v2v}
  run_name: ${oc.env:WANDB_RUN_NAME,wan22_v2v}
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: ["wan22", "wan2", "v2v", "grpo", "video", "pickscore", "dual-transformer", "trainside"]
  # Log a couple of generated clips to W&B so RL progress is eyeballable, while
  # keeping storage tiny: 2 short videos every 25 rollouts (raise interval / lower
  # max_items for less, or interval=1 to see every rollout).
  log_media: true
  media_max_items: 2
  media_log_interval: 25
